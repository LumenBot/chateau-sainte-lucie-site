# =====================================================================
# Configuration de déploiement Netlify — Château de Sainte-Lucie
# Site statique Astro. Le formulaire de contact utilise Netlify Forms
# (détecté automatiquement dans le HTML statique généré).
# =====================================================================

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Renseigner l'URL canonique définitive dans les variables d'environnement
  # du site Netlify (clé SITE_URL) pour le SEO / sitemap / OpenGraph.
  # ex. SITE_URL = "https://chateau-saintelucie.fr"

# En-têtes de sécurité de base
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache long pour les assets versionnés (hash dans le nom de fichier)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
